# Secret — vytvoř ručně jednou:
#   kubectl -n bankovni-kurzy create secret generic backend-secret \
#     --from-literal=SECRET_KEY='...' \
#     --from-literal=DB_NAME='bankovni_kurzy' \
#     --from-literal=DB_USER='bankovni_kurzy' \
#     --from-literal=DB_PASSWORD='...'
#
# Nebo použij deploy.sh který to udělá za tebe.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: bankovni-kurzy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: migrate
          image: bankovni-kurzy/backend:latest
          imagePullPolicy: Never
          command: ['sh', '-c', 'python manage.py migrate && python manage.py initdata']
          envFrom:
            - secretRef:
                name: backend-secret
          env:
            - name: DB_HOST
              value: postgres
            - name: ALLOWED_HOSTS
              value: "backend,kurzy.frapa.eu"
            - name: CORS_ORIGINS
              value: "https://kurzy.frapa.eu"
      containers:
        - name: backend
          image: bankovni-kurzy/backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: backend-secret
          env:
            - name: DB_HOST
              value: postgres
            - name: ALLOWED_HOSTS
              value: "backend,kurzy.frapa.eu"
            - name: CORS_ORIGINS
              value: "https://kurzy.frapa.eu"
          livenessProbe:
            httpGet:
              path: /api/v1/health/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: bankovni-kurzy
spec:
  selector:
    app: backend
  ports:
    - port: 8000
